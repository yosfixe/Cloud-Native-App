events {
    worker_connections 1024;
}

http {
    # ---------- Logging format — observability at the gateway level ----------
    log_format gateway_log
        '$time_iso8601 | $request_method $request_uri | '
        'Status: $status | Upstream: $upstream_addr | '
        'Duration: ${request_time}s | Client: $remote_addr';

    access_log /dev/stdout gateway_log;
    error_log /dev/stderr warn;

    # ---------- Upstream definitions — service discovery simulation ----------
    upstream room_upstream {
        server room-service:8081; # Docker DNS resolution
    }
    upstream guest_upstream {
        server guest-service:8082;
    }
    upstream reservation_upstream {
        server reservation-service:8083;
    }

    # ---------- Rate limiting zone (10 requests/second per IP) ----------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 8080;
        server_name api-gateway;

        # Apply rate limiting to all routes
        limit_req zone=api_limit burst=20 nodelay;

        # --- CORS headers (cross-cutting concern at gateway) ---
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';

        # Add gateway identifier header to all responses
        add_header 'X-Gateway' 'nginx-api-gateway';

        # ---------- Room Service Routes ----------
        location /rooms {
            proxy_pass http://room_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Service-Route rooms;
            proxy_read_timeout 10s;
        }

        # ---------- Guest Service Routes ----------
        location /guests {
            proxy_pass http://guest_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Service-Route guests;
            proxy_read_timeout 10s;
        }

        # ---------- Reservation Service Routes ----------
        location /reservations {
            proxy_pass http://reservation_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Service-Route reservations;
            proxy_read_timeout 15s;
        }

        # ---------- Gateway Health Check ----------
        location /gateway/health {
            return 200 '{"status":"UP","gateway":"nginx","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # ---------- Block direct access to internals ----------
        location /internal {
            return 403 '{"error":"Forbidden — internal route"}';
            add_header Content-Type application/json;
        }
    }
}
